<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setoran Sarkles Obstacle</title>
  <style>
    :root {
      --bg-1: #030712;
      --bg-2: #071022;
      --card: rgba(9, 16, 34, 0.70);
      --card-strong: rgba(12, 21, 45, 0.88);
      --line: rgba(149, 177, 230, 0.20);
      --line-strong: rgba(99, 230, 255, 0.42);
      --text: #eff6ff;
      --muted: #9fb0d1;
      --cyan: #62e8ff;
      --blue: #5b8cff;
      --violet: #9a7cff;
      --green: #52e2ad;
      --red: #ff617d;
      --shadow: 0 34px 120px rgba(0, 0, 0, 0.58);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 12%, rgba(98, 232, 255, 0.22), transparent 27rem),
        radial-gradient(circle at 86% 15%, rgba(154, 124, 255, 0.20), transparent 31rem),
        radial-gradient(circle at 50% 110%, rgba(91, 140, 255, 0.16), transparent 36rem),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, #0d1430 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.034) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.034) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.9), transparent 76%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.035) 46%, transparent 58%);
      transform: translateX(-120%);
      animation: sweep 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes sweep {
      0%, 38% { transform: translateX(-120%); }
      70%, 100% { transform: translateX(120%); }
    }

    .ambient {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(18px);
      opacity: 0.16;
      animation: float 9s ease-in-out infinite alternate;
    }

    .orb.one {
      width: 310px;
      height: 310px;
      left: -130px;
      bottom: 6%;
      background: var(--cyan);
    }

    .orb.two {
      width: 340px;
      height: 340px;
      right: -150px;
      top: 17%;
      background: var(--violet);
      animation-delay: 1.4s;
    }

    .orb.three {
      width: 220px;
      height: 220px;
      left: 50%;
      bottom: -90px;
      background: var(--blue);
      animation-delay: 2.2s;
    }

    @keyframes float {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(18px, -24px, 0) scale(1.07); }
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: min(720px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 34px 0;
    }

    .card {
      position: relative;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 32px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.030)),
        var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px);
      overflow: hidden;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(98, 232, 255, 0.72), rgba(255, 255, 255, 0.08), rgba(154, 124, 255, 0.60));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      pointer-events: none;
      z-index: 2;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -40% -30% auto auto;
      width: 320px;
      height: 320px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(98, 232, 255, 0.22), transparent 68%);
      pointer-events: none;
      z-index: -1;
    }

    .head {
      position: relative;
      padding: 38px 38px 22px;
      border-bottom: 1px solid rgba(149, 177, 230, 0.14);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), transparent);
    }

    .brand {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 56px;
    }

    .brand h1 {
      position: relative;
      margin: 0;
      color: transparent;
      background: linear-gradient(90deg, var(--cyan), #ffffff 42%, var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      font-size: clamp(22px, 5vw, 38px);
      font-weight: 950;
      letter-spacing: 0.18em;
      text-align: center;
      text-shadow: 0 0 34px rgba(98, 232, 255, 0.16);
    }

    .brand h1::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -16px;
      width: min(260px, 70vw);
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(98, 232, 255, 0.85), rgba(154, 124, 255, 0.85), transparent);
      box-shadow: 0 0 26px rgba(98, 232, 255, 0.45);
    }

    .body {
      padding: 32px 38px 38px;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    label {
      color: #d8e6ff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    input {
      width: 100%;
      min-height: 58px;
      border: 1px solid rgba(159, 176, 209, 0.22);
      outline: none;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.020)),
        rgba(3, 9, 21, 0.76);
      border-radius: 20px;
      padding: 16px 17px;
      font: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: border-color 170ms ease, box-shadow 170ms ease, transform 170ms ease, background 170ms ease;
    }

    input::placeholder {
      color: rgba(159, 176, 209, 0.58);
    }

    input:focus {
      border-color: var(--line-strong);
      box-shadow:
        0 0 0 4px rgba(98, 232, 255, 0.08),
        0 16px 44px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
      background: rgba(4, 11, 26, 0.86);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 4px;
    }

    button {
      position: relative;
      min-height: 58px;
      border: 0;
      border-radius: 20px;
      padding: 16px 22px;
      color: #04101d;
      background: linear-gradient(135deg, var(--cyan), #ffffff 45%, var(--violet));
      box-shadow: 0 18px 50px rgba(98, 232, 255, 0.18);
      cursor: pointer;
      font-weight: 950;
      letter-spacing: -0.02em;
      overflow: hidden;
      transition: transform 170ms ease, filter 170ms ease, opacity 170ms ease, box-shadow 170ms ease;
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.62), transparent);
      transform: translateX(-120%);
      transition: transform 620ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 22px 64px rgba(98, 232, 255, 0.24);
    }

    button:hover::before {
      transform: translateX(120%);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      transform: none;
    }

    .ghost {
      min-width: 112px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .ghost:hover {
      color: var(--text);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.18);
    }

    .notice {
      display: none;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.045);
      padding: 14px 15px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .notice.show {
      display: block;
      animation: appear 220ms ease both;
    }

    .notice.success {
      color: #c4f9e2;
      border-color: rgba(82, 226, 173, 0.34);
      background: rgba(82, 226, 173, 0.09);
    }

    .notice.error {
      color: #ffd0d8;
      border-color: rgba(255, 97, 125, 0.34);
      background: rgba(255, 97, 125, 0.09);
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 20px currentColor;
    }

    .status.ok .dot {
      background: var(--green);
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 22px, 720px);
        padding: 22px 0;
      }

      .head {
        padding: 30px 22px 22px;
      }

      .body {
        padding: 28px 22px 30px;
      }

      .brand h1 {
        letter-spacing: 0.11em;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .ghost {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
  </div>

  <main class="wrap">
    <section class="card">
      <div class="head">
        <div class="brand">
          <h1>BEARD COMMUNITY</h1>
        </div>
      </div>

      <div class="body">
        <form id="setoranForm">
          <div class="field">
            <label for="nama">Nama</label>
            <input id="nama" name="nama" type="text" placeholder="Masukkan nama" autocomplete="name" required>
          </div>

          <div class="field">
            <label for="jam">Berapa jam di map</label>
            <input id="jam" name="jam" type="number" min="0" step="0.1" placeholder="Contoh: 2.5" required>
          </div>

          <div id="notice" class="notice"></div>

          <div class="actions">
            <button type="submit" id="sendBtn">Kirim Setoran</button>
            <button type="button" class="ghost" id="resetBtn">Reset</button>
          </div>
        </form>

        <div class="status" id="statusBox"><span class="dot"></span><span id="statusText">Sistem belum aktif</span></div>
      </div>
    </section>
  </main>

  <script>
    const TELEGRAM_BOT_TOKEN = '8830932015:AAHuZtTFfaAxJCJ_z6DAGVorOjLAWxCK730';
    const TELEGRAM_CHAT_ID = '6632867820';
    const MAP_NAME = 'Sarkles Obstacle';
    const DAILY_KEY = 'bc_sarkles_daily_records';
    const WELCOME_TEXT = 'Welcome to Beard Community. Silakan isi nama dan total jam di map Sarkles Obstacle dengan benar.';
    const THANKS_TEXT = 'Terima kasih, sudah absen. Data kamu sudah terkirim.';

    const form = document.getElementById('setoranForm');
    const nama = document.getElementById('nama');
    const jam = document.getElementById('jam');
    const notice = document.getElementById('notice');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');

    function configured() {
      return TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID && TELEGRAM_BOT_TOKEN !== 'ISI_TOKEN_BOT_KAMU' && TELEGRAM_CHAT_ID !== 'ISI_CHAT_ID_KAMU';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatNumber(value) {
      const number = Number(value || 0);
      if (!Number.isFinite(number)) return '0';
      return number.toLocaleString('id-ID', { maximumFractionDigits: 2 });
    }

    function todayId() {
      const now = new Date();
      const offset = now.getTimezoneOffset();
      return new Date(now.getTime() - offset * 60000).toISOString().slice(0, 10);
    }

    function todayName() {
      return new Date().toLocaleDateString('id-ID', { weekday: 'long' });
    }

    function normalizeName(value) {
      return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function getDailyRecords() {
      try {
        const records = JSON.parse(localStorage.getItem(DAILY_KEY) || '[]');
        return Array.isArray(records) ? records : [];
      } catch {
        return [];
      }
    }

    function saveDailyRecords(records) {
      try {
        localStorage.setItem(DAILY_KEY, JSON.stringify(records.slice(0, 300)));
      } catch {
      }
    }

    function recordsToday() {
      const date = todayId();
      return getDailyRecords().filter(item => item.tanggal === date);
    }

    function submittedToday(name) {
      const target = normalizeName(name);
      return recordsToday().some(item => normalizeName(item.nama) === target);
    }

    function saveDailyRecord(data) {
      const records = getDailyRecords().filter(item => {
        const recentDate = new Date(item.tanggal + 'T00:00:00');
        const limitDate = new Date();
        limitDate.setDate(limitDate.getDate() - 30);
        return recentDate >= limitDate;
      });
      records.unshift(data);
      saveDailyRecords(records);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID';
        utterance.rate = 0.95;
        utterance.pitch = 1;
        utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
      } catch {
      }
    }

    let welcomeSpoken = false;

    function playWelcome() {
      if (welcomeSpoken) return;
      if (navigator.userActivation && !navigator.userActivation.hasBeenActive) {
        speak(WELCOME_TEXT);
        return;
      }
      welcomeSpoken = true;
      speak(WELCOME_TEXT);
    }

    function showNotice(type, message) {
      notice.className = 'notice show ' + type;
      notice.textContent = message;
    }

    function clearNotice() {
      notice.className = 'notice';
      notice.textContent = '';
    }

    function buildMessage(data) {
      const totalJam = Number(data.jam || 0);
      const status = totalJam > 0 ? 'HADIR' : 'BOLOS';
      const judul = totalJam > 0 ? 'SETORAN MASUK' : 'LAPORAN BOLOS';

      return [
        '<b>BEARD COMMUNITY</b>',
        '<b>' + judul + '</b>',
        '==============================',
        '<b>Map:</b> ' + escapeHtml(MAP_NAME),
        '<b>Tanggal:</b> ' + escapeHtml(data.tanggal),
        '<b>Hari:</b> ' + escapeHtml(data.hari),
        '<b>Nama:</b> ' + escapeHtml(data.nama),
        '<b>Total Jam:</b> ' + escapeHtml(formatNumber(data.jam)) + ' jam',
        '<b>Status Kehadiran:</b> ' + escapeHtml(status),
        '<b>Deteksi Harian:</b> ' + escapeHtml(data.statusHarian),
        '<b>Input Harian Ke:</b> ' + escapeHtml(data.inputHarianKe),
        '<b>Waktu Kirim:</b> ' + escapeHtml(new Date().toLocaleString('id-ID')),
        '==============================',
        '<b>Catatan:</b> Nama yang tidak muncul pada laporan harian sampai batas waktu berarti belum setor.'
      ].join('\n');
    }

    async function sendTelegram(text) {
      const response = await fetch('https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text,
          parse_mode: 'HTML',
          disable_web_page_preview: true
        })
      });

      const result = await response.json();
      if (!result.ok) throw new Error(result.description || 'Gagal mengirim setoran.');
      return result;
    }

    function updateStatus() {
      if (configured()) {
        statusBox.classList.add('ok');
        statusText.textContent = 'Sistem siap menerima setoran';
      } else {
        statusBox.classList.remove('ok');
        statusText.textContent = 'Sistem belum aktif';
      }
    }

    resetBtn.addEventListener('click', () => {
      form.reset();
      clearNotice();
      nama.focus();
    });

    document.addEventListener('pointerdown', playWelcome, { once: true });
    window.addEventListener('load', () => {
      setTimeout(playWelcome, 700);
    });

    form.addEventListener('submit', async event => {
      event.preventDefault();
      clearNotice();

      if (!configured()) {
        showNotice('error', 'Sistem belum aktif. Hubungi owner.');
        return;
      }

      const duplicateToday = submittedToday(nama.value);
      const todayCount = recordsToday().length;
      const data = {
        nama: nama.value.trim(),
        jam: jam.value,
        tanggal: todayId(),
        hari: todayName(),
        statusHarian: duplicateToday ? 'PEMBARUAN ABSEN HARI INI' : 'ABSEN HARI INI',
        inputHarianKe: duplicateToday ? todayCount : todayCount + 1
      };

      if (!data.nama || data.jam === '') {
        showNotice('error', 'Nama dan jam wajib diisi.');
        return;
      }

      if (Number(data.jam) < 0) {
        showNotice('error', 'Jam tidak boleh kurang dari 0.');
        return;
      }

      if (duplicateToday) {
        const lanjut = confirm('Nama ini sudah absen hari ini di perangkat ini. Kirim ulang sebagai pembaruan?');
        if (!lanjut) return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'Mengirim';

      try {
        await sendTelegram(buildMessage(data));
        saveDailyRecord(data);
        showNotice('success', 'Setoran berhasil dikirim.');
        speak(THANKS_TEXT);
        form.reset();
        nama.focus();
      } catch (error) {
        showNotice('error', error.message || 'Setoran gagal dikirim.');
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Kirim Setoran';
      }
    });

    updateStatus();
  </script>
</body>
</html>
